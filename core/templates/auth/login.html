{#
  login.html - 用户登录页 / User Login Page
  v3.0 - 加入Logo、slogan、背景动效
#}
{% extends 'base.html' %}

{% block title %}登录 - {{ config.COMPANY_NAME }}{% endblock %}

{% block content %}
<style>
    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .login-bg {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
        background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0c1222, #172554);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
    }
    .login-bg::after {
        content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(ellipse at 30% 20%, rgba(37,99,235,0.08) 0%, transparent 50%),
                    radial-gradient(ellipse at 70% 80%, rgba(6,182,212,0.06) 0%, transparent 50%);
    }
</style>
<div class="login-bg"></div>

<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-panel" style="width: 100%; max-width: 420px; padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
        <div style="text-align: center; margin-bottom: 32px;">
            {# Logo SVG #}
            <div style="margin-bottom: 16px;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="72" height="72">
                    <defs><linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2563eb"/><stop offset="100%" style="stop-color:#06b6d4"/></linearGradient></defs>
                    <polygon points="256,40 440,148 440,364 256,472 72,364 72,148" fill="none" stroke="url(#lg1)" stroke-width="24" stroke-linejoin="round"/>
                    <path d="M320,160 L200,160 Q140,160 140,220 L140,292 Q140,352 200,352 L320,352" fill="none" stroke="url(#lg1)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="320" cy="160" r="20" fill="#2563eb"/><circle cx="320" cy="352" r="20" fill="#2563eb"/>
                    <circle cx="200" cy="160" r="14" fill="#0ea5e9"/><circle cx="200" cy="352" r="14" fill="#0ea5e9"/>
                    <circle cx="140" cy="256" r="14" fill="#06b6d4"/>
                </svg>
            </div>
            <h1 style="margin: 0; font-size: 2rem; font-weight: 700; letter-spacing: 1px;">欢迎回来</h1>
            <p style="color: var(--color-text-sub); margin-top: 8px;">登录您的 CORE 账号</p>
            <p style="color: #64748b; margin-top: 4px; font-size: 0.82rem; letter-spacing: 2px;">高效协作，智慧管理</p>
        </div>

        <form method="post">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.9rem; color: var(--color-text-sub); margin-bottom: 8px;">用户名 / 真实姓名</label>
                <input type="text" name="username" class="form-control" style="width: 100%; box-sizing: border-box; padding: 12px; font-size: 1rem;" placeholder="请输入用户名" required>
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label style="display: block; font-size: 0.9rem; color: var(--color-text-sub); margin-bottom: 8px;">密码</label>
                <input type="password" name="password" class="form-control" style="width: 100%; box-sizing: border-box; padding: 12px; font-size: 1rem;" placeholder="请输入密码" required>
            </div>

            <button type="submit" class="btn-industrial" style="width: 100%; padding: 12px; font-size: 1rem; margin-bottom: 16px;">立即登录</button>
        </form>

        <div style="text-align: center; font-size: 0.9rem; color: var(--color-text-sub); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 16px;">
            <span>还没有账号？</span>
            <a href="{{ url_for('auth.register') }}" style="color: var(--color-primary); text-decoration: none; font-weight: 500;">注册新账号</a>
        </div>

        <div style="text-align: center; margin-top: 16px; font-size: 0.75rem; color: #475569;">
            CORE ERP v3.0.0
        </div>
    </div>
</div>
{% endblock %}
