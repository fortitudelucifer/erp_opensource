<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Outer hexagon -->
  <polygon points="256,40 440,148 440,364 256,472 72,364 72,148" fill="none" stroke="url(#g1)" stroke-width="24" stroke-linejoin="round"/>
  <!-- Inner C shape formed by 3 connected nodes -->
  <path d="M320,160 L200,160 Q140,160 140,220 L140,292 Q140,352 200,352 L320,352" fill="none" stroke="url(#g2)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Node dots -->
  <circle cx="320" cy="160" r="20" fill="#2563eb"/>
  <circle cx="200" cy="160" r="16" fill="#0ea5e9"/>
  <circle cx="140" cy="256" r="16" fill="#06b6d4"/>
  <circle cx="200" cy="352" r="16" fill="#0ea5e9"/>
  <circle cx="320" cy="352" r="20" fill="#2563eb"/>
  <!-- Center connector dot -->
  <circle cx="256" cy="256" r="12" fill="#38bdf8" opacity="0.6"/>
  <!-- Connecting lines to center -->
  <line x1="200" y1="160" x2="256" y2="256" stroke="#38bdf8" stroke-width="3" opacity="0.3"/>
  <line x1="200" y1="352" x2="256" y2="256" stroke="#38bdf8" stroke-width="3" opacity="0.3"/>
  <line x1="140" y1="256" x2="256" y2="256" stroke="#38bdf8" stroke-width="3" opacity="0.3"/>
</svg>
